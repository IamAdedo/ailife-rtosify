name: Build Android APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Phone App ───────────────────────────────────────────────────────────────
  build-phone:
    name: Build Phone App (rtosify)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: rtosify
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: rtosify
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        working-directory: rtosify
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: rtosify
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-app-debug
          path: rtosify/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-app-release-unsigned
          path: rtosify/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # ── Watch Companion App ─────────────────────────────────────────────────────
  build-watch:
    name: Build Watch App (companion)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: companion
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: companion
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        working-directory: companion
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: companion
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-debug
          path: companion/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-release-unsigned
          path: companion/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # ── Summary gate ────────────────────────────────────────────────────────────
  build-summary:
    name: All builds passed
    runs-on: ubuntu-latest
    needs: [ build-phone, build-watch ]
    steps:
      - name: Done
        run: echo "Both phone and watch APKs built successfully."
